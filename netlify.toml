[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Proxy API requests to the Oracle Cloud backend
[[redirects]]
  from = "/api/*"
  to = "http://79.76.103.60:8000/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
